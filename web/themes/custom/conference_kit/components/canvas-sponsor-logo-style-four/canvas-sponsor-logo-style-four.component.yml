$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: Sponsor Logo Style Four
status: stable
description: 'A DrupalCamp-style sponsor logo tile for sponsor teaser displays.'
group: Sponsors / Logos
props:
  type: object
  properties:
    logo:
      title: Logo
      type: object
      $ref: json-schema-definitions://canvas.module/image
      description: Optional sponsor logo image. If omitted, the default inline logo is shown.
      examples:
        - src: 'sponsor.svg'
          alt: 'Sponsor logo'
          width: 240
          height: 120
    label:
      title: Accessible label
      type: string
      description: Accessible text for the sponsor logo.
      examples:
        - 'Sponsor logo'
