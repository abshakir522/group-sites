tailpine_icons:
  label: "My Theme SVG Icons"
  extractor: svg
  config:
    sources:
    - images/icons/*.svg
  settings:
    size:
      title: "Size"
      type: integer
      default: 30
  template: >-
    <svg xmlns="http://www.w3.org/2000/svg"
         class="icon text-icon-{{ icon_id|clean_class }} {{ attributes.class }}""
         width="{{ size|default(30) }}"
         height="{{ size|default(30) }}"
         viewBox="0 0 100 100"
         fill="none"
         stroke = "none"
         stroke-width= "2"
         aria-hidden="true">
      {{ content }}
    </svg>

conference_kit_social:
  label: "Conference Kit social icons"
  extractor: svg_sprite
  config:
    sources:
      - images/icons/social.svg
  settings:
    size:
      title: "Size"
      type: integer
      default: 14
  template: >-
    <svg xmlns="http://www.w3.org/2000/svg"
      {{ attributes
        .addClass('icon', 'icon-' ~ icon_id|clean_class, 'transition-colors', 'duration-300', 'group-hover:text-body-title')
        .setAttribute('width', size|default(14))
        .setAttribute('height', size|default(14))
        .setAttribute('fill', 'currentColor')
        .setAttribute('stroke', 'currentColor')
        .setAttribute('aria-hidden', 'true')
      }}>
      <use href="{{ source }}#{{ icon_id }}" fill="currentColor" stroke="currentColor"></use>
    </svg>
