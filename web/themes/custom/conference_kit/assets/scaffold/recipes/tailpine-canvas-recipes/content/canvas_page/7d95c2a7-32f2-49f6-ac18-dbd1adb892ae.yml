        title: 'What is Tailpine?'
        default_open: false
        description:
          value: '<p>Tailpine is a modern Drupal theme framework built with Tailwind CSS and component-driven architecture. It focuses on flexibility, performance, and developer-friendly customization.</p>'
          format: canvas_html_block
