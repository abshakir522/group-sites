      inputs:
        title: 'How do Tailpine components work?'
        default_open: true
        description:
          value: '<p>Tailpine components are built using Drupal’s Single Directory Components (SDC). Each component contains its own Twig template, metadata, and styling.</p>'
          format: canvas_html_block
